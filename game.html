<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor + Juego de Fichas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="modal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <p id="modal-message"></p>
            <button id="retry-button">Seguir editando</button>
        </div>
    </div>

    <h1>Editor de tablero 6x6</h1>
    <div id="move-counter">Movimientos: 0</div>

    <div id="app-layout">
        <aside id="editor-panel">
            <h2>Fichas disponibles</h2>
            <p class="hint">Haz clic para agregar una ficha al tablero.</p>
            <div id="palette"></div>

            <h3>Meta de salida (roja)</h3>
            <label for="goal-row">Fila de salida:</label>
            <select id="goal-row"></select>

            <h3>Acciones de ficha seleccionada</h3>
            <div id="piece-actions">
                <button id="rotate-piece">Rotar (Horizontal/Vertical)</button>
                <button id="remove-piece">Quitar ficha</button>
            </div>

            <button id="reset-board" class="secondary">Vaciar tablero</button>
        </aside>

        <main>
            <div id="game-board" aria-label="Tablero de juego 6 por 6"></div>
            <section id="piece-info">
                <h3>Posiciones actuales</h3>
                <div id="positions"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
